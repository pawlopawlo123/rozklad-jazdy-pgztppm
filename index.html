<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>P02 → Rynek (Stanisławów)</title>

<style>

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#f3f3f3;
}

.header{
    background:#1976d2;
    color:#fff;
    padding:14px 16px;
    font-size:20px;
    font-weight:bold;
    position:sticky;
    top:0;
}

.route{
    position:relative;
    margin-top:8px;
}

.line{
    position:absolute;
    left:22px;
    top:0;
    bottom:0;
    width:3px;
    background:#d32f2f;
}

.stop{
    position:relative;
    display:flex;
    justify-content:space-between;
    align-items:center;
    height:38px;
    padding-left:44px;
    padding-right:14px;
}

.circle{
    position:absolute;
    left:14px;
    width:18px;
    height:18px;
    border-radius:50%;
    background:#fff;
    border:3px solid #d32f2f;
}

.name{
    flex:1;
    font-size:15px;
    color:#2e7d32;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}

.time{
    width:55px;
    text-align:right;
    font-size:15px;
    color:#666;
}

</style>

</head>

<body>

<div class="header">
P02 → Rynek (Stanisławów)
</div>

<div class="route">

<div class="line"></div>

<div class="stop">
<div class="circle"></div>

<div class="time">04:52</div>
</div>

<div class="stop">

</div>

<div class="stop">
<div class="circle"></div>
<div class="name">Szosowa 01</div>
<div class="time">04:56</div>
</div>

<div class="stop">
<div class="circle"></div>
<div class="name">Łukasińskiego 01</div>
<div class="time">04:57</div>
</div>

<div class="stop">
<div class="circle"></div>
<div class="name">Dąbrowskiego 01</div>
<div class="time">04:58</div>
</div>

</div>

</html>
